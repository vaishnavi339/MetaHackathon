id: customer-support-env
name: Customer Support Environment
description: Real-world customer support simulation for training AI agents

entrypoint: env.environment:CustomerSupportEnvironment

observation_space:
  type: Observation

action_space:
  type: Action

reward_space:
  type: Reward

tasks:
  - id: easy
    description: Easy FAQ resolution
    grader: env.grader:grade_easy
    grader_fn: env.grader:grade_easy
  - id: medium
    description: Angry customer handling
    grader: env.grader:grade_medium
    grader_fn: env.grader:grade_medium
  - id: hard
    description: Multi-step escalation
    grader: env.grader:grade_hard
    grader_fn: env.grader:grade_hard

max_steps: 8
